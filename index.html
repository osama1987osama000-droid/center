<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز الإتقان للمقاولات والتمديدات</title>
    <!-- استيراد خطوط مميزة وأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #0c4a6e; /* أزرق غامق صحي */
            --secondary-color: #f59e0b; /* أصفر/برتقالي كهربائي */
            --bg-color: #f8fafc;
            --text-color: #1e293b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding-bottom: 30px;
        }

        /* الهيدر (رأس الصفحة) */
        .header {
            background: linear-gradient(135deg, var(--primary-color), #0284c7);
            color: white;
            text-align: center;
            padding: 40px 20px;
            border-bottom-left-radius: 25px;
            border-bottom-right-radius: 25px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .header h1 {
            font-size: 26px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* الحاوية الرئيسية */
        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 20px;
        }

        /* أزرار الاتصال السريع */
        .action-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: -15px;
            margin-bottom: 25px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-whatsapp {
            background-color: #25D366;
        }

        .btn-call {
            background-color: #3b82f6;
        }

        /* بطاقة الموقع */
        .location-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            margin-bottom: 25px;
            border: 1px solid #e2e8f0;
            text-align: center;
        }

        .location-card i {
            font-size: 32px;
            color: #ef4444;
            margin-bottom: 10px;
        }

        .btn-maps {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background-color: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            margin-top: 15px;
            font-size: 14px;
        }

        /* أقسام الخدمات */
        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: var(--primary-color);
            border-right: 4px solid var(--secondary-color);
            padding-right: 8px;
        }

        .services-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .service-item {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #e2e8f0;
        }

        .service-item i {
            font-size: 28px;
            color: var(--secondary-color);
            margin-bottom: 10px;
        }

        .service-item h3 {
            font-size: 14px;
            color: var(--text-color);
        }

        /* الفوتر */
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <!-- الهيدر -->
    <div class="header">
        <h1>مركز الإتقان</h1>
        <p>للصيانة المنزلية والتمديدات الصحية والكهربائية</p>
    </div>

    <div class="container">
        
        <!-- أزرار التواصل السريع -->
        <div class="action-buttons">
            <a href="https://wa.me/963941924746" class="btn btn-whatsapp" target="_blank">
                <i class="fab fa-whatsapp"></i> واتساب
            </a>
            <a href="tel:+963941924746" class="btn btn-call">
                <i class="fas fa-phone-alt"></i> اتصال مباشر
            </a>
        </div>

        <!-- بطاقة الموقع والدليلك إلينا -->
        <div class="location-card">
            <i class="fas fa-map-marked-alt"></i>
            <h2>موقعنا في إدلب</h2>
            <p style="margin-top: 5px; color: #64748b; font-size: 14px;">إدلب المدينة - المنطقة الغربية</p>
            <a href="https://maps.app.goo.gl/YBYnAXLzLmjQ8jL86?g_st=aw" class="btn-maps" target="_blank">
                <i class="fas fa-directions"></i> افتح الخريطة وتفضل بزيارتنا
            </a>
        </div>

        <!-- أقسام المركز -->
        <h2 class="section-title">خدماتنا وبضائعنا</h2>
        <div class="services-grid">
            <div class="service-item">
                <i class="fas fa-wrench"></i>
                <h3>تمديدات صحية</h3>
            </div>
            <div class="service-item">
                <i class="fas fa-lightbulb"></i>
                <h3>إنارة وكهرباء</h3>
            </div>
            <div class="service-item">
                <i class="fas fa-tools"></i>
                <h3>صيانة منزلية</h3>
            </div>
            <div class="service-item">
                <i class="fas fa-tags"></i>
                <h3>عروض وتخفيضات</h3>
            </div>
        </div>

        <!-- الفوتر -->
  <div class="footer">  
            <p>جميع الحقوق محفوظة لـ مركز الإتقان © 2026</p>
        </div>

    </div>

</body>
</html>
